<div class="min-h-screen bg-[#fafafa] font-main flex">
  
  <div 
    *ngIf="isSidebarOpen" 
    class="fixed inset-0 z-40 bg-zinc-900/20 backdrop-blur-sm lg:hidden"
    (click)="closeSidebar()">
  </div>

  <aside
    class="fixed inset-y-0 left-0 z-50 w-72 bg-white border-r border-zinc-200 transition-transform duration-300 ease-in-out transform lg:relative lg:translate-x-0 flex flex-col"
    [class.translate-x-0]="isSidebarOpen"
    [class.-translate-x-full]="!isSidebarOpen"
  >
    <div class="h-20 flex items-center px-6 border-b border-zinc-100">
      <div class="flex items-center gap-3">
        <div class="h-9 w-9 rounded-lg bg-indigo-600 flex items-center justify-center text-white shadow-sm">
          <span class="font-bold text-base">H</span>
        </div>
        <span class="text-lg font-semibold tracking-tight text-zinc-900">Household</span>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto py-6 px-4 space-y-8">
      <div>
        <h3 class="px-3 text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-4">
          Management
        </h3>
        <nav class="space-y-1">
          <a
            routerLink="/monthly-budgets"
            routerLinkActive="bg-indigo-50 text-indigo-600"
            [routerLinkActiveOptions]="{ exact: true }"
            class="flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg text-zinc-600 hover:bg-zinc-50 hover:text-zinc-900 transition-colors"
            (click)="closeSidebar()"
          >
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" />
            </svg>
            Monthly Budgets
          </a>

          <a
            routerLink="/expense-categories"
            routerLinkActive="bg-indigo-50 text-indigo-600"
            class="flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg text-zinc-600 hover:bg-zinc-50 hover:text-zinc-900 transition-colors"
            (click)="closeSidebar()"
          >
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.568 3H5.25A2.25 2.25 0 0 0 3 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 0 0 5.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 0 0 9.568 3Z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 6h.008v.008H6V6Z" />
            </svg>
            Categories
          </a>

          <a
            routerLink="/expenses"
            routerLinkActive="bg-indigo-50 text-indigo-600"
            class="flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg text-zinc-600 hover:bg-zinc-50 hover:text-zinc-900 transition-colors"
            (click)="closeSidebar()"
          >
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
            Expenses
          </a>
        </nav>
      </div>
    </div>

    <div class="p-4 border-t border-zinc-100">
      <button 
        (click)="logout()"
        class="w-full flex items-center gap-3 px-3 py-2 text-sm font-medium text-red-600 hover:bg-red-50 rounded-lg transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6A2.25 2.25 0 0 0 5.25 5.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75" />
        </svg>
        Sign out
      </button>
    </div>
  </aside>

  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    
    <header class="h-20 bg-white border-b border-zinc-200">
      <div class="max-w-screen-2xl mx-auto h-full flex items-center justify-between px-4 sm:px-8">
        <div class="flex items-center gap-4">
          <button
            (click)="toggleSidebar()"
            class="p-2 rounded-lg text-zinc-500 hover:bg-zinc-100 lg:hidden">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
            </svg>
          </button>
          <h2 class="text-xl font-semibold text-zinc-900">Dashboard</h2>
        </div>

        <div class="flex items-center gap-4">
          <span class="hidden sm:block text-sm font-medium text-zinc-500">Welcome, Camilo</span>
          <div class="h-9 w-9 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold border border-indigo-200">
            C
          </div>
        </div>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto">
      <div class="max-w-screen-2xl mx-auto p-4 sm:p-8">
        <div class="bg-white border border-zinc-200 rounded-2xl shadow-sm min-h-[calc(100vh-12rem)] p-6">
          <router-outlet></router-outlet>
        </div>
      </div>
    </main>

  </div>
</div>
