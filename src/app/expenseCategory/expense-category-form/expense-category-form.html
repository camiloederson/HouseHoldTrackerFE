<div class="space-y-8">
  <div class="border-b border-zinc-100 pb-5">
    <h1 class="text-2xl font-bold text-zinc-900 tracking-tight">
      {{ isEditMode ? 'Edit Category' : 'Create Category' }}
    </h1>
    <p class="mt-2 text-sm text-zinc-500">
      Define a spending limit for this specific category.
    </p>
  </div>

  <form [formGroup]="expenseCategoryForm" (ngSubmit)="onSubmit()" class="max-w-2xl space-y-6">
    <div>
      <label for="name" class="block text-sm font-semibold text-zinc-700 mb-1.5">Category Name</label>
      <input
        id="name"
        type="text"
        formControlName="name"
        placeholder="e.g., Groceries, Rent, Entertainment"
        class="input-minimal"
      />
      <p *ngIf="expenseCategoryForm.controls.name.touched && expenseCategoryForm.controls.name.invalid" class="mt-2 text-xs text-red-500 font-medium">
        A valid name is required.
      </p>
    </div>

    <div class="grid gap-6 md:grid-cols-2">
      <div>
        <label for="allocatedAmount" class="block text-sm font-semibold text-zinc-700 mb-1.5">Allocated Amount</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400 text-sm">$</span>
          <input
            id="allocatedAmount"
            type="number"
            step="0.01"
            formControlName="allocatedAmount"
            placeholder="0.00"
            class="input-minimal pl-7"
          />
        </div>
        <p *ngIf="expenseCategoryForm.controls.allocatedAmount.touched && expenseCategoryForm.controls.allocatedAmount.invalid" class="mt-2 text-xs text-red-500 font-medium">
          Amount must be greater than 0.
        </p>
      </div>

<div>
  <label for="monthlyBudgetId" class="block text-sm font-semibold text-zinc-700 mb-1.5">Monthly Budget</label>
  <select
    id="monthlyBudgetId"
    formControlName="monthlyBudgetId"
    class="input-minimal bg-white appearance-none"
  >
    <option [value]="null" disabled selected>Select a budget</option>
    <option *ngFor="let budget of monthlyBudgets" [value]="budget.id">
      {{ budget.month }}/{{ budget.year }} - {{ budget.householdName }}
    </option>
  </select>
  <p *ngIf="expenseCategoryForm.controls.monthlyBudgetId.touched && expenseCategoryForm.controls.monthlyBudgetId.invalid" class="mt-2 text-xs text-red-500 font-medium">
    Please select a valid budget.
  </p>
</div>
    </div>

    <div *ngIf="errorMessage" class="p-3 bg-red-50 border border-red-100 rounded-lg text-sm text-red-600">
      {{ errorMessage }}
    </div>

    <div class="flex items-center gap-3 pt-4">
      <button type="submit" [disabled]="isLoading" class="btn-primary px-8">
        {{ isLoading ? 'Saving...' : (isEditMode ? 'Update Category' : 'Create Category') }}
      </button>
      <button type="button" (click)="goBack()" class="px-5 py-2.5 text-sm font-semibold text-zinc-600 hover:text-zinc-900 transition-colors">
        Cancel
      </button>
    </div>
  </form>
</div>
