<div class="space-y-8">
  <div class="border-b border-zinc-100 pb-5">
    <h1 class="text-2xl font-bold text-zinc-900 tracking-tight">
      {{ isEditMode ? 'Edit Expense' : 'Create Expense' }}
    </h1>
  </div>

  <form [formGroup]="expenseForm" (ngSubmit)="onSubmit()" class="max-w-3xl space-y-6">
    <div>
      <label class="block text-sm font-semibold text-zinc-700 mb-1.5">Title</label>
      <input type="text" formControlName="title" placeholder="e.g., Grocery Shopping" class="input-minimal" />
    </div>

    <div>
      <label class="block text-sm font-semibold text-zinc-700 mb-1.5">Description</label>
      <textarea rows="2" formControlName="description" class="input-minimal resize-none"></textarea>
    </div>

    <div class="grid gap-6 md:grid-cols-2">
      <div>
        <label class="block text-sm font-semibold text-zinc-700 mb-1.5">Amount</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400">$</span>
          <input type="number" step="0.01" formControlName="amount" class="input-minimal pl-7" />
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-zinc-700 mb-1.5">Date</label>
        <input type="date" formControlName="expenseDate" class="input-minimal" />
      </div>
    </div>

    <div class="grid gap-6 md:grid-cols-2 p-4 bg-zinc-50 rounded-xl border border-zinc-200">
      <div>
        <label class="block text-[10px] font-bold uppercase text-zinc-500 mb-1">Target Budget</label>
        <select formControlName="monthlyBudgetId" class="input-minimal bg-white">
          <option [value]="null" disabled>Select Budget</option>
          <option *ngFor="let b of budgets" [value]="b.id">{{ b.month }}/{{ b.year }} - {{ b.householdName }}</option>
        </select>
      </div>

      <div>
        <label class="block text-[10px] font-bold uppercase text-zinc-500 mb-1">Category</label>
        <select formControlName="categoryId" class="input-minimal bg-white">
          <option [value]="null" disabled>Select Category</option>
          <option *ngFor="let c of categories" [value]="c.id">{{ c.name }}</option>
        </select>
      </div>
    </div>

    <div class="flex items-center gap-3 pt-4">
      <button type="submit" [disabled]="isLoading" class="btn-primary px-8">
        {{ isLoading ? 'Saving...' : 'Save Expense' }}
      </button>
      <button type="button" (click)="goBack()" class="text-sm font-semibold text-zinc-500">Cancel</button>
    </div>
  </form>
</div>
