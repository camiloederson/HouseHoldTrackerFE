<div class="space-y-8">
  <div class="border-b border-zinc-100 pb-5">
    <h1 class="text-2xl font-bold text-zinc-900 tracking-tight">
      {{ isEditMode ? 'Edit Monthly Budget' : 'Create Monthly Budget' }}
    </h1>
    <p class="mt-2 text-sm text-zinc-500">
      Set the financial foundation for your household this month.
    </p>
  </div>

  <form [formGroup]="monthlyBudgetForm" (ngSubmit)="onSubmit()" class="max-w-2xl space-y-6">
    <div class="grid gap-6 md:grid-cols-2">
      <div>
        <label for="year" class="block text-sm font-semibold text-zinc-700 mb-1.5">Year</label>
        <input id="year" type="number" formControlName="year" class="input-minimal" />
      </div>

      <div>
        <label for="month" class="block text-sm font-semibold text-zinc-700 mb-1.5">Month</label>
        <select id="month" formControlName="month" class="input-minimal appearance-none">
          <option *ngFor="let m of months" [value]="m.value">{{ m.name }}</option>
        </select>
      </div>
    </div>

    <div>
      <label for="plannedAmount" class="block text-sm font-semibold text-zinc-700 mb-1.5">Planned Amount</label>
      <div class="relative">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400 text-sm">$</span>
        <input id="plannedAmount" type="number" step="0.01" formControlName="plannedAmount" class="input-minimal pl-7" />
      </div>
    </div>

    <div class="p-4 bg-zinc-50 rounded-xl border border-zinc-200">
      <label for="householdId" class="block text-sm font-semibold text-zinc-700 mb-1.5">Household</label>
      <select id="householdId" formControlName="householdId" class="input-minimal bg-white">
        <option [value]="null" disabled selected>Select a household</option>
        <option *ngFor="let h of households" [value]="h.id">{{ h.name }}</option>
      </select>
      <p *ngIf="monthlyBudgetForm.controls.householdId.touched && monthlyBudgetForm.controls.householdId.invalid" class="mt-2 text-xs text-red-500 font-medium">
        Please select a household.
      </p>
    </div>

    <div *ngIf="errorMessage" class="p-3 bg-red-50 border border-red-100 rounded-lg text-sm text-red-600">
      {{ errorMessage }}
    </div>

    <div class="flex items-center gap-3 pt-4">
      <button type="submit" [disabled]="isLoading" class="btn-primary px-8">
        {{ isLoading ? 'Saving...' : (isEditMode ? 'Update Budget' : 'Create Budget') }}
      </button>
      <button type="button" (click)="goBack()" class="px-5 py-2.5 text-sm font-semibold text-zinc-600 hover:text-zinc-900 transition-colors">
        Cancel
      </button>
    </div>
  </form>
</div>
