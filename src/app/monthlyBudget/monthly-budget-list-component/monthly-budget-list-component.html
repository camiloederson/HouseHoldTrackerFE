<div class="space-y-6">
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl font-bold text-zinc-900 tracking-tight">Monthly Budgets</h1>
      <p class="text-sm text-zinc-500 mt-1">High-level overview of your household financial planning.</p>
    </div>
    <button (click)="onCreate()" class="btn-primary">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 mr-2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
      </svg>
      New Budget
    </button>
  </div>

  <div class="overflow-hidden border border-zinc-200 rounded-xl bg-white shadow-sm">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-zinc-50/50 border-b border-zinc-200">
            <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-zinc-500">Period (Year/Month)</th>
            <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-zinc-500 text-right">Planned Amount</th>
            <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-zinc-500">Household</th>
            <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-zinc-500 text-right">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-zinc-100">
          <tr *ngFor="let budget of monthlyBudgets" (click)="goToDetail(budget.id)" class="hover:bg-zinc-50/50 transition-colors">
            <td class="px-6 py-4">
              <div class="flex items-center gap-3">
                <div class="flex flex-col">
                  <span class="text-sm font-semibold text-zinc-900">{{ budget.year }}</span>
                  <span class="text-xs text-zinc-500">Month: {{ budget.month }}</span>
                </div>
              </div>
            </td>
            <td class="px-6 py-4 text-right">
              <span class="text-sm font-mono font-bold text-indigo-600">${{ budget.plannedAmount }}</span>
            </td>
            <td class="px-6 py-4">
              <div class="text-sm text-zinc-600">{{ budget.householdName }}</div>
              <div class="text-[10px] text-zinc-400 font-medium">ID: {{ budget.householdId }}</div>
            </td>
            <td class="px-6 py-4 text-right">
              <div class="flex justify-end gap-2">
                <button (click)="onEdit(budget.id); $event.stopPropagation()" class="p-2 text-zinc-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all">
                   <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125" />
                  </svg>
                </button>
                <button (click)="onDelete(budget.id); $event.stopPropagation()" class="p-2 text-zinc-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-all">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                  </svg>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
