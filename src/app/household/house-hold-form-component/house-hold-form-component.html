<div class="max-w-2xl mx-auto py-8">
  <div class="mb-8">
    <h1 class="text-2xl font-bold text-zinc-900">
      {{ isEditMode ? 'Edit' : 'Create' }} Household
    </h1>
  </div>

  <form [formGroup]="householdForm" (ngSubmit)="onSubmit()" class="space-y-6">
    <div>
      <label class="block text-sm font-medium text-zinc-700 mb-2">Name</label>
      <input 
        type="text" 
        formControlName="name" 
        class="input-minimal"
        placeholder="Enter household name"
      >
      <p *ngIf="householdForm.controls.name.touched && householdForm.controls.name.invalid" 
         class="mt-2 text-xs text-red-500">
        Name is required (max 150 chars).
      </p>
    </div>

    <div class="flex gap-4">
      <button type="submit" [disabled]="isLoading" class="btn-primary">
        {{ isLoading ? 'Saving...' : 'Save' }}
      </button>
      <button type="button" (click)="goBack()" class="btn-secondary">
        Cancel
      </button>
    </div>
  </form>
</div>
