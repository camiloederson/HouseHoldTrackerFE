<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-zinc-900 tracking-tight">Households</h1>
      <p class="text-sm text-zinc-500 mt-1">Manage the groups for your expenses.</p>
    </div>
    <button (click)="onCreate()" class="btn-primary">New Household</button>
  </div>

  <div class="overflow-hidden border border-zinc-200 rounded-xl bg-white shadow-sm">
    <table class="w-full text-left border-collapse">
      <thead class="bg-zinc-50/50 border-b border-zinc-200">
        <tr>
          <th class="px-6 py-4 text-xs font-bold uppercase text-zinc-500">ID</th>
          <th class="px-6 py-4 text-xs font-bold uppercase text-zinc-500">Name</th>
          <th class="px-6 py-4 text-xs font-bold uppercase text-zinc-500 text-right">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-zinc-100">
        <tr *ngFor="let h of households" class="hover:bg-zinc-50/50 transition-colors">
          <td class="px-6 py-4 text-sm text-zinc-500">#{{ h.id }}</td>
          <td class="px-6 py-4 text-sm font-semibold text-zinc-900">{{ h.name }}</td>
          <td class="px-6 py-4 text-right flex justify-end gap-2">
            <button (click)="onEdit(h.id)" class="p-2 text-zinc-400 hover:text-indigo-600"><svg>...</svg></button>
            <button (click)="onDelete(h.id)" class="p-2 text-zinc-400 hover:text-red-600"><svg>...</svg></button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
